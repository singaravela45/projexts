<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>web</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="calculator">
      <input type="text" class="display" readonly value="0" />
      <div class="btn">
        <div class="seven button number">7</div>
        <div class="eight button number">8</div>
        <div class="nine button number">9</div>
        <div class="plus button  oper">+</div>
        <div class="four button number">4</div>
        <div class="five button number">5</div>
        <div class="six button number">6</div>
        <div class="subtract button  oper">-</div>
        <div class="one button number">1</div>
        <div class="two button number">2</div>
        <div class="three button number">3</div>
        <div class="multiply button  oper">*</div>
        <div class="clear button  ">AC</div>
        <div class="enter button ">=</div>
        <div class="zero button number ">0</div>
        <div class="divide button  oper">/</div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
