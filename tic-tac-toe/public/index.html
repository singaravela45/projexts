<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Tic-Tac-Toe</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playwrite+HU:wght@100..400&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div class="container1">
      <header>Tic - Tac -Toe</header>
      <div class="fullbox">
        <div class="box" data-index="0"></div>
        <div class="box" data-index="1"></div>
        <div class="box" data-index="2"></div>
        <div class="box" data-index="3"></div>
        <div class="box" data-index="4"></div>
        <div class="box" data-index="5"></div>
        <div class="box" data-index="6"></div>
        <div class="box" data-index="7"></div>
        <div class="box" data-index="8"></div>
        
      </div>
    </div>
    <div class="resetbtn">
      <button type="reset" id="reset">Reset</button>
    </div>
    <div class="container2">
      <div class="player1_score">
        <div>Player 1 (X)</div>
        <br />
        <p class="player1score score">
          0
        </p>
      </div>
      <div class="tie_score">
        <div>Tie</div>
        <br />
        <p class="tiescore score">0</p>
      </div>
      <div class="player2_score turnfinder">
        <div>Player 2 (O)</div>
        <br />
        <p class="player2score score">0</p>
      </div>
    </div>
  </body>
  <script src="script.js"></script>
</html>
